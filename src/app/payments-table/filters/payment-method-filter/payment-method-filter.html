<app-filter-button
  label="Payment Method"
  [value]="valueLabel()"
  [accessibleValue]="accessibleValueLabel()"
  [expanded]="open()"
  [controls]="popoverId()"
  (editRequested)="toggleFilter()"
  (clearRequested)="clearFilter()"
/>

@if (open()) {
  <section
    class="payment-method-filter__popover"
    [id]="popoverId()"
    role="dialog"
    [attr.aria-labelledby]="popoverId() + '-title'"
  >
    <h2 [id]="popoverId() + '-title'">Filtered by: payment method</h2>

    <div class="payment-method-filter__groups" [id]="popoverId() + '-methods'">
      @for (group of groups; track group.key) {
        <fieldset class="payment-method-filter__group">
          <legend>{{ group.label }}</legend>

          <div class="payment-method-filter__options">
            @for (option of group.options; track option.value) {
              <label class="payment-method-filter__option">
                <input
                  #methodCheckbox
                  type="checkbox"
                  name="payment-method"
                  [value]="option.value"
                  [checked]="isSelected(option.value)"
                  (change)="updatePaymentMethod(option.value, methodCheckbox.checked)"
                />
                <span class="payment-method-filter__checkbox" aria-hidden="true"></span>
                <svg
                  class="payment-method-filter__checkmark"
                  viewBox="0 0 14 14"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path
                    d="M9.846 3.801a.929.929 0 0 1 1.37 0 1.076 1.076 0 0 1 0 1.456l-4.64 4.94a.929.929 0 0 1-1.37 0L2.784 7.623a1.076 1.076 0 0 1 0-1.456.929.929 0 0 1 1.37 0L5.89 8.013l3.955-4.212Z"
                  />
                </svg>
                <span class="payment-method-filter__label">{{ option.label }}</span>
              </label>
            }
          </div>
        </fieldset>
      }
    </div>

    <footer class="payment-method-filter__footer">
      <button type="button" class="payment-method-filter__apply" (click)="applyFilter()">
        Apply
      </button>
    </footer>
  </section>
}
