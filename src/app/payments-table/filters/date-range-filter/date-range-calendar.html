<div class="calendar-header">
  <button type="button" aria-label="Show previous month" (click)="showPreviousMonth()">
    <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
      <path d="m12.5 5-5 5 5 5" />
    </svg>
  </button>
  <h3 [id]="labelId()" aria-live="polite" aria-atomic="true">{{ monthLabel() }}</h3>
  <button
    type="button"
    aria-label="Show next month"
    [disabled]="!canShowNextMonth()"
    (click)="showNextMonth()"
  >
    <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
      <path d="m7.5 5 5 5-5 5" />
    </svg>
  </button>
</div>

<div class="calendar-scroll">
  <table
    class="calendar"
    role="grid"
    [attr.aria-labelledby]="labelId()"
    aria-multiselectable="true"
  >
    <thead>
      <tr>
        @for (weekday of weekdays; track weekday.full) {
          <th scope="col" [abbr]="weekday.full">
            <span aria-hidden="true">{{ weekday.short }}</span>
            <span class="visually-hidden">{{ weekday.full }}</span>
          </th>
        }
      </tr>
    </thead>
    <tbody>
      @for (week of calendarWeeks(); track $index) {
        <tr>
          @for (day of week; track day.date) {
            <td
              role="gridcell"
              [class.day-cell--in-range]="day.isInRange"
              [class.day-cell--range-start]="day.isRangeStart"
              [class.day-cell--range-end]="day.isRangeEnd"
              [attr.aria-selected]="
                day.isRangeStart || day.isRangeEnd || day.isInRange ? 'true' : 'false'
              "
            >
              <button
                type="button"
                [attr.data-date]="day.date"
                [attr.tabindex]="focusedDate() === day.date ? 0 : -1"
                [attr.aria-label]="day.label"
                [attr.aria-current]="day.isToday ? 'date' : null"
                [class.day--outside]="!day.inDisplayedMonth"
                [class.day--today]="day.isToday"
                [class.day--range-edge]="day.isRangeStart || day.isRangeEnd"
                [disabled]="day.date > today()"
                (click)="selectDate(day.date)"
                (keydown)="onDateKeydown($event, day.date)"
              >
                {{ day.dayOfMonth }}
              </button>
            </td>
          }
        </tr>
      }
    </tbody>
  </table>
</div>
