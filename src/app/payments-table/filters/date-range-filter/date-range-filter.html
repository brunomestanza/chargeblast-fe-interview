<app-filter-button
  label="Date and time"
  [value]="valueLabel()"
  [expanded]="open()"
  [controls]="popoverId()"
  (editRequested)="toggleFilter()"
  (clearRequested)="clearFilter()"
/>

@if (open()) {
  <section
    class="date-filter__popover"
    [id]="popoverId()"
    role="dialog"
    [attr.aria-labelledby]="popoverId() + '-title'"
  >
    <h2 [id]="popoverId() + '-title'">Filtered by: date</h2>
    <p class="visually-hidden" [id]="popoverId() + '-date-format-hint'">
      Enter dates in YYYY-MM-DD format.
    </p>

    <form (submit)="applyFilter($event)">
      <div class="date-filter__select-shell date-filter__operator">
        <label class="visually-hidden" [for]="popoverId() + '-operator'"> Filter selection </label>
        <select
          #operatorControl
          [id]="popoverId() + '-operator'"
          [value]="draftOperator()"
          (change)="changeOperator($event)"
        >
          @for (operator of operators; track operator.value) {
            <option [value]="operator.value">{{ operator.label }}</option>
          }
        </select>
        <svg viewBox="0 0 12 12" aria-hidden="true" focusable="false">
          <path d="m2.5 4 3.5-3 3.5 3M2.5 8 6 11l3.5-3" />
        </svg>
      </div>

      @switch (draftOperator()) {
        @case ('in-the-last') {
          <div class="date-filter__value-row date-filter__relative-row">
            <svg
              class="date-filter__direction"
              viewBox="0 0 16 16"
              aria-hidden="true"
              focusable="false"
            >
              <path d="M3 8h9m-3.5-3.5L12 8l-3.5 3.5" />
            </svg>
            <label class="visually-hidden" [for]="popoverId() + '-relative-days'">
              Number of days
            </label>
            <input
              [id]="popoverId() + '-relative-days'"
              type="number"
              min="1"
              max="100000"
              step="1"
              inputmode="numeric"
              autocomplete="off"
              [value]="draftRelativeDays()"
              (input)="changeRelativeDays($event)"
            />
            <div class="date-filter__select-shell date-filter__unit">
              <label class="visually-hidden" [for]="popoverId() + '-unit'">Date unit</label>
              <select [id]="popoverId() + '-unit'" aria-label="Date unit">
                <option value="days">days</option>
              </select>
              <svg viewBox="0 0 12 12" aria-hidden="true" focusable="false">
                <path d="m2.5 4 3.5-3 3.5 3M2.5 8 6 11l3.5-3" />
              </svg>
            </div>
          </div>
        }
        @case ('equals') {
          <div class="date-filter__value-row date-filter__date-row">
            <svg
              class="date-filter__direction"
              viewBox="0 0 16 16"
              aria-hidden="true"
              focusable="false"
            >
              <path d="M3 8h9m-3.5-3.5L12 8l-3.5 3.5" />
            </svg>
            <label class="visually-hidden" [for]="popoverId() + '-date'">Date</label>
            <input
              [id]="popoverId() + '-date'"
              type="text"
              inputmode="numeric"
              placeholder="YYYY-MM-DD"
              autocomplete="off"
              spellcheck="false"
              maxlength="10"
              [value]="draftStart()"
              [attr.aria-describedby]="popoverId() + '-date-format-hint'"
              (input)="changeStart($event)"
            />
          </div>
        }
        @case ('between') {
          <div class="date-filter__between-fields">
            <div class="date-filter__value-row date-filter__date-row">
              <svg
                class="date-filter__direction"
                viewBox="0 0 16 16"
                aria-hidden="true"
                focusable="false"
              >
                <path d="M3 8h9m-3.5-3.5L12 8l-3.5 3.5" />
              </svg>
              <label class="visually-hidden" [for]="popoverId() + '-start'">Start date</label>
              <input
                [id]="popoverId() + '-start'"
                type="text"
                inputmode="numeric"
                placeholder="YYYY-MM-DD"
                autocomplete="off"
                spellcheck="false"
                maxlength="10"
                [value]="draftStart()"
                [attr.aria-describedby]="popoverId() + '-date-format-hint'"
                (input)="changeStart($event)"
              />
            </div>
            <div class="date-filter__value-row date-filter__date-row">
              <span class="date-filter__and" aria-hidden="true">and</span>
              <label class="visually-hidden" [for]="popoverId() + '-end'">End date</label>
              <input
                [id]="popoverId() + '-end'"
                type="text"
                inputmode="numeric"
                placeholder="YYYY-MM-DD"
                autocomplete="off"
                spellcheck="false"
                maxlength="10"
                [value]="draftEnd()"
                [attr.aria-describedby]="popoverId() + '-date-format-hint'"
                (input)="changeEnd($event)"
              />
            </div>
          </div>
        }
      }

      <button type="submit" class="date-filter__apply" [disabled]="!canApply()">Apply</button>
    </form>
  </section>
}
