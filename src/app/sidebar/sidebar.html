<aside class="sidebar" aria-label="Dashboard sidebar">
  <app-account-switcher />

  <div class="sidebar__scroll">
    <nav class="sidebar__navigation" aria-label="Main navigation">
      <ul>
        <li>
          <a
            class="sidebar__link"
            routerLink="/home"
            routerLinkActive="sidebar__link--active"
            [routerLinkActiveOptions]="routeMatchOptions"
            ariaCurrentWhenActive="page"
          >
            <app-dashboard-icon name="home" />
            <span>Home</span>
          </a>
        </li>
        <li>
          <a
            class="sidebar__link"
            routerLink="/balances"
            routerLinkActive="sidebar__link--active"
            [routerLinkActiveOptions]="routeMatchOptions"
            ariaCurrentWhenActive="page"
          >
            <app-dashboard-icon name="balances" />
            <span>Balances</span>
          </a>
        </li>
        <li>
          <a
            class="sidebar__link"
            [class.sidebar__link--active]="transactionsRouteActive()"
            routerLink="/"
            [attr.aria-current]="transactionsRouteActive() ? 'page' : null"
          >
            <app-dashboard-icon name="payments" />
            <span>Transactions</span>
          </a>
        </li>
        <li>
          <a
            class="sidebar__link"
            routerLink="/customers"
            routerLinkActive="sidebar__link--active"
            [routerLinkActiveOptions]="routeMatchOptions"
            ariaCurrentWhenActive="page"
          >
            <app-dashboard-icon name="customers" />
            <span>Customers</span>
          </a>
        </li>
        <li>
          <a
            class="sidebar__link"
            routerLink="/product-catalog"
            routerLinkActive="sidebar__link--active"
            [routerLinkActiveOptions]="routeMatchOptions"
            ariaCurrentWhenActive="page"
          >
            <app-dashboard-icon name="catalog" />
            <span>Product catalog</span>
          </a>
        </li>
      </ul>
    </nav>

    <nav class="sidebar__navigation" aria-labelledby="sidebar-shortcuts-heading">
      <h2 class="sidebar__section-heading" id="sidebar-shortcuts-heading">Shortcuts</h2>
      <ul>
        @for (shortcut of shortcuts; track shortcut.label) {
          <li>
            <a class="sidebar__link" routerLink="/mock">
              <app-dashboard-icon [name]="shortcut.icon" />
              <span>{{ shortcut.label }}</span>
            </a>
          </li>
        }
      </ul>
    </nav>

    <nav class="sidebar__navigation" aria-labelledby="sidebar-products-heading">
      <h2 class="sidebar__section-heading" id="sidebar-products-heading">Products</h2>
      <ul>
        @for (product of products; track product.label) {
          <li>
            <a class="sidebar__link" routerLink="/mock">
              <app-dashboard-icon [name]="product.icon" />
              <span>{{ product.label }}</span>
              <app-dashboard-icon class="sidebar__link-chevron" name="chevron-down" />
            </a>
          </li>
        }
      </ul>
    </nav>
  </div>

  <nav class="sidebar__navigation sidebar__navigation--footer" aria-label="Developer tools">
    <ul>
      <li>
        <a class="sidebar__link" routerLink="/mock">
          <app-dashboard-icon name="terminal" />
          <span>Developers</span>
        </a>
      </li>
    </ul>
  </nav>
</aside>
