<div class="account-switcher" (focusout)="handleFocusOut($event)">
  <button
    #accountTrigger
    type="button"
    class="account-switcher__trigger"
    aria-label="Open company and account menu for Chargeblast"
    aria-haspopup="dialog"
    [attr.aria-expanded]="isOpen()"
    (click)="toggle()"
  >
    <span class="company-mark" aria-hidden="true">{{ currentCompanyInitial }}</span>
    <span class="account-switcher__name">{{ currentCompany }}</span>
    <app-dashboard-icon class="account-switcher__chevron" name="chevron-down" />
  </button>

  @if (isOpen()) {
    <section
      id="account-switcher-panel"
      class="account-menu"
      role="dialog"
      aria-label="Company and account menu"
      aria-modal="false"
    >
      <header class="account-menu__header">
        <span class="company-mark company-mark--header" aria-hidden="true">{{
          currentCompanyInitials
        }}</span>
        <p class="account-menu__company">{{ currentCompany }}</p>
        <p class="account-menu__eyebrow">Current company</p>
      </header>

      <a class="account-menu__cta" routerLink="/mock" (click)="close()">Exit sandbox</a>

      <nav class="account-menu__section" aria-label="Workspace options">
        <a class="account-menu__row" routerLink="/settings" (click)="close()">
          <app-dashboard-icon name="settings" />
          <span>Settings</span>
        </a>
        <a class="account-menu__row" routerLink="/mock" (click)="close()">
          <app-dashboard-icon name="sandbox" />
          <span>Switch sandbox</span>
          <app-dashboard-icon class="account-menu__row-chevron" name="chevron-right" />
        </a>
        <a class="account-menu__row" routerLink="/mock" (click)="close()">
          <app-dashboard-icon name="plus" />
          <span>Create</span>
          <app-dashboard-icon class="account-menu__row-chevron" name="chevron-right" />
        </a>
      </nav>

      <div class="account-menu__divider" aria-hidden="true"></div>

      <nav class="account-menu__section" aria-label="User options">
        <a class="account-menu__row" routerLink="/mock" (click)="close()">
          <app-dashboard-icon name="customers" />
          <span>Bruno Mestanza</span>
          <app-dashboard-icon class="account-menu__row-info" name="info" />
        </a>
        <a class="account-menu__row" routerLink="/mock" (click)="close()">
          <app-dashboard-icon name="sign-out" />
          <span>Sign out</span>
        </a>
      </nav>
    </section>
  }
</div>
